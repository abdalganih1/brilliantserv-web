<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختيار القالب - مؤسسة روائع الكريستال</title>
    <meta name="description"
        content="اختر من بين 6 تصاميم احترافية لموقع مؤسسة روائع الكريستال للأعمال الميكانيكية والكهربائية">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #0a0a0f 100%);
            min-height: 100vh;
            color: #fff;
            padding: 2rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 3rem 0;
        }

        .logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin-bottom: 1.5rem;
            border: 3px solid rgba(255, 255, 255, 0.1);
            object-fit: cover;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #00ff88, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.1rem;
        }

        /* Company Info Banner */
        .company-info {
            background: rgba(0, 255, 136, 0.05);
            border: 1px solid rgba(0, 255, 136, 0.2);
            border-radius: 16px;
            padding: 1.5rem 2rem;
            margin-top: 2rem;
            display: flex;
            justify-content: center;
            gap: 3rem;
            flex-wrap: wrap;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .info-item svg {
            width: 20px;
            height: 20px;
            color: #00ff88;
            flex-shrink: 0;
        }

        .info-item a {
            color: inherit;
            text-decoration: none;
            transition: color 0.3s;
        }

        .info-item a:hover {
            color: #00ff88;
        }

        /* Templates Grid */
        .templates-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }

        .template-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s ease;
            position: relative;
        }

        .template-card:hover {
            transform: translateY(-10px);
            border-color: rgba(0, 255, 136, 0.5);
            box-shadow: 0 20px 60px rgba(0, 255, 136, 0.15);
        }

        .template-card.recommended {
            border-color: #00ff88;
        }

        .template-card.recommended::before {
            content: '⭐ موصى به';
            position: absolute;
            top: 15px;
            right: 15px;
            background: linear-gradient(135deg, #00ff88, #00d4ff);
            color: #000;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            z-index: 10;
        }

        .template-preview {
            width: 100%;
            height: 250px;
            object-fit: cover;
            object-position: cneter;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.3);
        }

        .template-info {
            padding: 1.5rem;
        }

        .template-name {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .template-colors {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .color-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .template-desc {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            margin-bottom: 1rem;
            line-height: 1.6;
        }

        .template-features {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .feature-tag {
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88;
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .template-actions {
            display: flex;
            gap: 1rem;
        }

        .btn {
            flex: 1;
            padding: 0.8rem 1.5rem;
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            text-align: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00ff88, #00d4ff);
            color: #000;
            border: none;
        }

        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.3);
        }

        .btn-disabled {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: not-allowed;
        }

        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 15px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .status-ready {
            background: rgba(0, 255, 136, 0.15);
            color: #00ff88;
        }

        .status-coming {
            background: rgba(255, 165, 0, 0.15);
            color: #ffa500;
        }

        /* Latest Articles Section */
        .latest-section {
            margin-top: 4rem;
            padding-top: 3rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .section-title {
            text-align: center;
            margin-bottom: 2rem;
        }

        .section-title h2 {
            font-size: 1.5rem;
            color: #fff;
            margin-bottom: 0.5rem;
        }

        .section-title p {
            color: rgba(255, 255, 255, 0.6);
        }

        .articles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .article-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .article-card:hover {
            border-color: rgba(0, 255, 136, 0.3);
        }

        .article-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .article-card .content {
            padding: 1rem;
        }

        .article-card h4 {
            font-size: 0.95rem;
            margin-bottom: 0.5rem;
            color: #fff;
            line-height: 1.4;
        }

        .article-card .date {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            display: block;
            margin-top: 0.5rem;
        }

        footer {
            text-align: center;
            padding: 3rem 0;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .templates-grid {
                grid-template-columns: 1fr;
            }

            .company-info {
                gap: 1rem;
                padding: 1rem;
            }

            .info-item {
                font-size: 0.9rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <img src="media/brilliantcrystal.jpg" alt="روائع الكريستال" class="logo">
            <h1>اختر قالب موقعك</h1>
            <p class="subtitle">6 تصاميم احترافية (3 جاهز) لموقع مؤسسة روائع الكريستال</p>

            <div class="company-info">
                <div class="info-item">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
                        <circle cx="12" cy="10" r="3" />
                    </svg>
                    <span>الرياض، المملكة العربية السعودية</span>
                </div>
                <div class="info-item">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <path
                            d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72" />
                    </svg>
                    <a href="tel:0550698111">0550698111</a>
                </div>
                <div class="info-item">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <path
                            d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72" />
                    </svg>
                    <a href="tel:0114160614">0114160614</a>
                </div>
                <div class="info-item">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <rect x="2" y="7" width="20" height="14" rx="2" ry="2" />
                        <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16" />
                    </svg>
                    <span>15+ سنة خبرة • 500+ مشروع</span>
                </div>
            </div>
        </header>

        <div class="templates-grid" id="templatesGrid"></div>

        <!-- Latest Articles Section -->
        <section class="latest-section">
            <div class="section-title">
                <h2>📰 أحدث المقالات المتوفرة</h2>
                <p>تم استخراج هذه المقالات من محتوى الموقع الحالي (summary.json)</p>
            </div>
            <div class="articles-grid" id="articlesGrid"></div>
        </section>

        <footer>
            <p>© 2025 مؤسسة روائع الكريستال - نظام عرض القوالب</p>
        </footer>
    </div>

    <script>
        // Embedded template data with custom generated images matching color schemes
        const TEMPLATES_DATA = {
            templates: [
                {
                    id: "template-1",
                    name: "القالب الأزرق الداكن",
                    status: "ready",
                    recommended: false,
                    colors: ["#0a0a0f", "#3b82f6", "#f59e0b"],
                    description: "تصميم عصري بألوان زرقاء داكنة مع لمسات ذهبية. مثالي للمظهر الاحترافي والموثوق.",
                    features: ["أعمال كهربائية", "أعمال ميكانيكية", "لف مواتير", "مدونة"],
                    preview: "media/preview_images/template1.png"
                },
                {
                    id: "template-2",
                    name: "الهوية الخضراء",
                    status: "ready",
                    recommended: true,
                    colors: ["#0a0a0a", "#00ff88", "#ff8c00"],
                    description: "تصميم مطابق للهوية البصرية للشركة. ألوان نيون خضراء مع لمسات برتقالية.",
                    features: ["المضخات والبوسترات", "لوحات التحكم", "شهادات معتمدة"],
                    preview: "media/preview_images/template2.png"
                },
                {
                    id: "template-3",
                    name: "الأبيض العصري",
                    status: "ready",
                    recommended: false,
                    colors: ["#ffffff", "#10b981", "#1f2937"],
                    description: "تصميم نظيف وبسيط بخلفية بيضاء. مثالي للمظهر الحديث والمريح للعين.",
                    features: ["تصميم عصري", "صور Hero احترافية", "شعارات العملاء"],
                    preview: "media/preview_images/template3.png"
                },
                {
                    id: "template-4",
                    name: "التدرج البنفسجي",
                    status: "coming",
                    recommended: false,
                    colors: ["#7c3aed", "#ec4899", "#0a0a0f"],
                    description: "تصميم جريء بتدرجات بنفسجية ووردية. يعطي إحساساً بالابتكار والتميز.",
                    features: ["تصميم عصري", "ألوان جريئة", "تدرجات لونية"],
                    preview: "media/preview_images/template4.png"
                },
                {
                    id: "template-5",
                    name: "الصناعي",
                    status: "coming",
                    recommended: false,
                    colors: ["#374151", "#22c55e", "#f59e0b"],
                    description: "تصميم قوي يعكس طبيعة العمل الصناعي. ألوان رمادية مع لمسات خضراء.",
                    features: ["تصميم صناعي", "ألوان قوية"],
                    preview: "media/preview_images/template5.png"
                },
                {
                    id: "template-6",
                    name: "المؤسسي الكلاسيكي",
                    status: "coming",
                    recommended: false,
                    colors: ["#1e40af", "#64748b", "#f8fafc"],
                    description: "تصميم مؤسسي رسمي. مثالي للعقود الحكومية والشركات الكبرى.",
                    features: ["تصميم رسمي", "مظهر احترافي"],
                    preview: "media/preview_images/template6.png"
                }
            ],
            // Real data extracted from content/summary.json
            latestPosts: [
                {
                    title: "صيانة وحدات التكييف المركزي",
                    date: "2025-05-04",
                    image: "https://brilliantserv.com/wp-content/uploads/2025/05/صيانة-وحدات-التكييف-المركزي.webp"
                },
                {
                    title: "صيانة الكروت الإلكترونية",
                    date: "2025-05-03",
                    image: "https://brilliantserv.com/wp-content/uploads/2025/04/صيانة-الكروت-الإلكترونية-_1_.webp"
                },
                {
                    title: "صيانة وبرمجة مكائن التعبئة كفاءة عالية",
                    date: "2025-04-14",
                    image: "https://brilliantserv.com/wp-content/uploads/2025/04/صيانة-وبرمجة-مكائن-التعبئة-_1_.webp"
                },
                {
                    title: "صيانة البوردات الالكترونية",
                    date: "2025-04-09",
                    image: "https://brilliantserv.com/wp-content/uploads/2025/04/صيانة-البوردات-الالكترونية.webp"
                }
            ]
        };

        function renderTemplates() {
            const grid = document.getElementById('templatesGrid');
            grid.innerHTML = TEMPLATES_DATA.templates.map(template => `
                <div class="template-card ${template.recommended ? 'recommended' : ''}">
                    <img src="${template.preview}" alt="${template.name}" class="template-preview" 
                         onerror="this.src='media/brilliantcrystal.jpg'">
                    <div class="template-info">
                        <h3 class="template-name">
                            ${template.name}
                            <span class="status-badge ${template.status === 'ready' ? 'status-ready' : 'status-coming'}">
                                ${template.status === 'ready' ? 'جاهز' : 'قريباً'}
                            </span>
                        </h3>
                        <div class="template-colors">
                            ${template.colors.map(color => `
                                <span class="color-dot" style="background: ${color};"></span>
                            `).join('')}
                        </div>
                        <p class="template-desc">${template.description}</p>
                        <div class="template-features">
                            ${template.features.slice(0, 4).map(feature => `
                                <span class="feature-tag">${feature}</span>
                            `).join('')}
                        </div>
                        <div class="template-actions">
                            ${template.status === 'ready'
                    ? `<a href="templates/${template.id}/index.html" class="btn btn-primary">معاينة</a>`
                    : `<span class="btn btn-disabled">قريباً</span>`
                }
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderLatestArticles() {
            const grid = document.getElementById('articlesGrid');
            grid.innerHTML = TEMPLATES_DATA.latestPosts.map(post => `
                <div class="article-card">
                    <img src="${post.image}" alt="${post.title}" onerror="this.src='media/brilliantcrystal.jpg'">
                    <div class="content">
                        <h4>${post.title}</h4>
                        <span class="date">${post.date}</span>
                    </div>
                </div>
            `).join('');
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderTemplates();
            renderLatestArticles();
        });
    </script>
</body>

</html>
